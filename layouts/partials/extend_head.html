{{/* JSON-LD Structured Data */}}
{{- if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "KDesk Accounting",
  "url": {{ .Site.BaseURL | jsonify }},
  "description": "Audit-ready Excel templates for controllers and finance managers at SaaS startups. ASC 606 commission capitalization, ASC 842 lease accounting, startup runway modeling."
}
</script>
{{- else if eq .Section "templates" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Product",
  "name": {{ .Title | jsonify }},
  "description": {{ .Description | jsonify }},
  "brand": {
    "@type": "Brand",
    "name": "KDesk Accounting"
  },
  "url": {{ .Permalink | jsonify }},
  "category": "Software > Business and Finance",
  "offers": {
    "@type": "Offer",
    {{- with .Params.price }}
    "price": "{{ . }}",
    {{- end }}
    "priceCurrency": "USD",
    "availability": "https://schema.org/InStock",
    "seller": {
      "@type": "Organization",
      "name": "KDesk Accounting"
    }
  }
}
</script>
{{- else if eq .Section "posts" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": {{ .Title | jsonify }},
  "description": {{ .Description | jsonify }},
  "datePublished": "{{ .Date.Format "2006-01-02" }}",
  {{- with .Lastmod }}
  "dateModified": "{{ .Format "2006-01-02" }}",
  {{- end }}
  "author": {
    "@type": "Organization",
    "name": "KDesk Accounting",
    "url": {{ .Site.BaseURL | jsonify }}
  },
  "publisher": {
    "@type": "Organization",
    "name": "KDesk Accounting",
    "url": {{ .Site.BaseURL | jsonify }}
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": {{ .Permalink | jsonify }}
  }
}
</script>
{{- end }}
{{- if .Params.faq }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {{- range $i, $item := .Params.faq }}{{ if $i }},{{ end }}
    {
      "@type": "Question",
      "name": {{ $item.q | jsonify }},
      "acceptedAnswer": {
        "@type": "Answer",
        "text": {{ $item.a | jsonify }}
      }
    }
    {{- end }}
  ]
}
</script>
{{- end }}

{{/* Favicons */}}
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

{{/* Scroll-triggered fade-in animations */}}
<script>
document.addEventListener('DOMContentLoaded',function(){
  var targets=document.querySelectorAll('.kd-proof-card,.kd-product,.kd-post-card,.kd-section__hd,.kd-animate-target');
  if(!targets.length||!('IntersectionObserver' in window))return;
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){e.target.classList.add('kd-animate');obs.unobserve(e.target);}
    });
  },{threshold:0.12,rootMargin:'0px 0px -40px 0px'});
  targets.forEach(function(t){obs.observe(t);});
});
</script>
